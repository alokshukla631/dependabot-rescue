name: Feature Request
description: Suggest a new ecosystem, classifier, or workflow improvement.
title: "[feature] "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What maintainer pain should this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Describe the behavior you want to see.
    validations:
      required: true
